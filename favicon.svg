<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- aliquoto — saw spectrum on a green calculator LCD -->
  <rect x="1" y="1" width="62" height="62" rx="9" fill="#263425"/>
  <rect x="5" y="5" width="54" height="54" rx="5" fill="#c6d28e"/>
  <!-- faint LCD scanlines -->
  <g fill="#a9b86c" opacity=".5">
    <rect x="5" y="13" width="54" height="1"/>
    <rect x="5" y="23" width="54" height="1"/>
    <rect x="5" y="33" width="54" height="1"/>
    <rect x="5" y="43" width="54" height="1"/>
  </g>
  <!-- baseline -->
  <rect x="8" y="51" width="48" height="2" fill="#102318"/>
  <!-- partials: 1/n saw, printed dark ink; one inharmonic in magenta -->
  <g fill="#102318">
    <rect x="10" y="12" width="5" height="39"/>
    <rect x="20" y="26" width="5" height="25"/>
    <rect x="30" y="33" width="5" height="18"/>
    <rect x="48" y="41" width="5" height="10"/>
  </g>
  <rect x="39" y="37" width="5" height="14" fill="#8c1748"/>
  <!-- partial dots -->
  <circle cx="12.5" cy="12" r="3" fill="#102318"/>
  <circle cx="22.5" cy="26" r="3" fill="#102318"/>
  <circle cx="32.5" cy="33" r="3" fill="#102318"/>
  <circle cx="41.5" cy="37" r="3" fill="#8c1748"/>
  <circle cx="50.5" cy="41" r="3" fill="#102318"/>
</svg>
